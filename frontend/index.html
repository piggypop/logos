<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Logos</title>
        <link rel="stylesheet" href="style.css" />
        <!-- marked.js for markdown rendering -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
        <!-- highlight.js for code blocks -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    </head>
    <body>
        <!-- Image Generation Modal (ComfyUI) -->
        <div id="image-overlay" class="hidden">
            <div id="image-panel">
                <div class="settings-header">
                    <span>Generate Image</span>
                    <button id="image-close">✕</button>
                </div>
                <div class="settings-body">
                    <label>Prompt</label>
                    <textarea
                        id="img-prompt"
                        rows="4"
                        placeholder="describe what to generate..."
                    ></textarea>
                    <label
                        >Negative prompt
                        <span class="muted-note"
                            >(override; blank uses default)</span
                        ></label
                    >
                    <textarea id="img-negative" rows="2"></textarea>
                    <div id="img-progress" class="muted-note"></div>
                    <img id="img-live-preview" class="hidden" alt="live preview" style="width:100%;border-radius:6px;margin-top:8px;image-rendering:auto;" />
                </div>
                <div class="settings-footer">
                    <button id="img-generate">Generate</button>
                    <button id="img-cancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Settings Panel (hidden by default) -->
        <div id="settings-overlay" class="hidden">
            <div id="settings-panel">
                <div class="settings-header">
                    <span>Settings</span>
                    <button id="settings-close">✕</button>
                </div>

                <div class="settings-tabs">
                    <button class="settings-tab active" data-tab="model">
                        Model
                    </button>
                    <button class="settings-tab" data-tab="search">
                        Search
                    </button>
                    <button class="settings-tab" data-tab="prompt">
                        System Prompt
                    </button>
                    <button class="settings-tab" data-tab="notebook">
                        Notebook
                    </button>
                    <button class="settings-tab" data-tab="image">Image</button>
                    <button class="settings-tab" data-tab="obsidian">
                        Obsidian
                    </button>
                    <button class="settings-tab" data-tab="memory">
                        Memory
                    </button>
                </div>

                <div class="settings-body">
                    <!-- Model tab -->
                    <div class="settings-tab-panel active" data-panel="model">
                        <label>Ollama Host</label>
                        <input type="text" id="s-ollama-host" />

                        <label
                            >Model
                            <button id="s-refresh-models" class="inline-btn">
                                ↺
                            </button>
                        </label>
                        <select id="s-model"></select>

                        <label>Temperature</label>
                        <input
                            type="range"
                            id="s-temperature"
                            min="0"
                            max="2"
                            step="0.1"
                        />
                        <span id="s-temperature-val">0.7</span>

                        <div class="temp-override-row">
                            <span id="s-temp-mode" class="muted-note"
                                >global</span
                            >
                            <button
                                id="s-temp-toggle"
                                class="inline-btn"
                                title="Toggle per-model temperature"
                            >
                                ✎
                            </button>
                        </div>

                        <label class="checkbox-label">
                            <input type="checkbox" id="s-conservative-mode" />
                            Conservative mode
                            <span class="muted-note"
                                >(temperature 0.4, optimized for small
                                models)</span
                            >
                        </label>

                        <label>Your Location</label>
                        <input
                            type="text"
                            id="s-user-location"
                            placeholder="e.g., Athens, Greece"
                        />

                        <label>Response Language</label>
                        <select id="s-response-language">
                            <option value="auto">Auto (detect from message)</option>
                            <option value="English">English</option>
                            <option value="Greek">Greek / Ελληνικά</option>
                            <option value="Spanish">Spanish / Español</option>
                            <option value="French">French / Français</option>
                            <option value="German">German / Deutsch</option>
                            <option value="Italian">Italian / Italiano</option>
                            <option value="Portuguese">Portuguese / Português</option>
                            <option value="Russian">Russian / Русский</option>
                            <option value="Chinese">Chinese / 中文</option>
                            <option value="Japanese">Japanese / 日本語</option>
                            <option value="Arabic">Arabic / العربية</option>
                        </select>
                        <span class="muted-note">Forces replies in this language even when you paste a URL or image without text.</span>
                    </div>

                    <!-- Search tab -->
                    <div class="settings-tab-panel" data-panel="search">
                        <label>Search Provider</label>
                        <select id="s-search-provider">
                            <option value="ddg">DuckDuckGo (no setup)</option>
                            <option value="brave">Brave Search API</option>
                            <option value="searxng">
                                SearXNG (self-hosted)
                            </option>
                        </select>

                        <div
                            id="s-provider-brave"
                            class="provider-field hidden"
                        >
                            <label>Brave API Key</label>
                            <input
                                type="password"
                                id="s-brave-api-key"
                                placeholder="from api.search.brave.com"
                            />
                        </div>

                        <div
                            id="s-provider-searxng"
                            class="provider-field hidden"
                        >
                            <label>SearXNG URL</label>
                            <input
                                type="text"
                                id="s-searxng-url"
                                placeholder="http://localhost:8081"
                            />
                        </div>

                        <label>Search Results Count</label>
                        <input
                            type="number"
                            id="s-results-count"
                            min="1"
                            max="20"
                        />

                        <label class="checkbox-label">
                            <input type="checkbox" id="s-auto-search" /> Auto
                            Search
                        </label>
                    </div>

                    <!-- System Prompt tab (textarea takes full height) -->
                    <div class="settings-tab-panel" data-panel="prompt">
                        <label>System Prompt</label>
                        <textarea
                            id="s-system-prompt"
                            class="full-height"
                        ></textarea>
                    </div>

                    <!-- Notebook tab -->
                    <div class="settings-tab-panel" data-panel="notebook">
                        <label>Open Notebook API URL</label>
                        <input
                            type="text"
                            id="s-notebook-url"
                            placeholder="http://localhost:5055"
                        />

                        <label
                            >Open Notebook UI URL
                            <span class="muted-note"
                                >(for source links)</span
                            ></label
                        >
                        <input
                            type="text"
                            id="s-notebook-ui-url"
                            placeholder="http://localhost:8502"
                        />

                        <div
                            style="display: flex; gap: 8px; align-items: center"
                        >
                            <button id="s-notebook-connect" class="inline-btn">
                                Connect / Refresh
                            </button>
                            <span id="s-notebook-status" class="muted-note"
                                >not connected</span
                            >
                        </div>

                        <label
                            >Active Notebook
                            <button
                                id="s-notebook-refresh"
                                class="inline-btn"
                                title="Re-read sources from Open Notebook (clear cache)"
                            >
                                ↺
                            </button>
                        </label>
                        <select id="s-notebook-active">
                            <option value="">
                                — None (notebook integration off) —
                            </option>
                        </select>
                        <div id="s-notebook-info" class="muted-note"></div>
                        <div
                            id="s-notebook-warning"
                            class="hidden notebook-warning"
                        ></div>
                    </div>

                    <!-- Image tab (ComfyUI) -->
                    <div class="settings-tab-panel" data-panel="image">
                        <label>ComfyUI URL</label>
                        <input
                            type="text"
                            id="s-comfyui-url"
                            placeholder="http://localhost:8188"
                        />

                        <div
                            style="display: flex; gap: 8px; align-items: center"
                        >
                            <button id="s-comfyui-connect" class="inline-btn">
                                Connect / Refresh
                            </button>
                            <span id="s-comfyui-status" class="muted-note"
                                >not connected</span
                            >
                        </div>

                        <label>Workflow</label>
                        <select id="s-comfyui-workflow">
                            <option value="sdxl-default">
                                txt2img — SDXL / SD 1.5 / SD 2 / Pony
                            </option>
                            <option value="flux-default">
                                txt2img — Flux.1 (dev / schnell)
                            </option>
                            <option value="img2img-default">
                                img2img — SDXL / SD 1.5 (attach image)
                            </option>
                            <option value="custom">
                                Custom workflow (paste JSON)
                            </option>
                        </select>

                        <div id="s-comfyui-custom-wrap" class="hidden">
                            <label
                                >Custom workflow JSON
                                <span class="muted-note"
                                    >(API format · placeholders: {{PROMPT}},
                                    {{CHECKPOINT}}, {{SEED}}, {{STEPS}},
                                    {{WIDTH}}, {{HEIGHT}}, {{SAMPLER}},
                                    {{SCHEDULER}}, {{CFG}}, {{NEGATIVE}},
                                    {{GUIDANCE}}, {{DENOISE}}, {{INPUT_IMAGE}})</span
                                >
                            </label>
                            <textarea
                                id="s-comfyui-custom-workflow"
                                rows="6"
                                placeholder='{"3": {"inputs": {...}}, ...}'
                            ></textarea>
                        </div>

                        <label>Checkpoint</label>
                        <select id="s-comfyui-checkpoint"></select>

                        <div class="row-two">
                            <div>
                                <label>Sampler</label>
                                <select id="s-comfyui-sampler"></select>
                            </div>
                            <div>
                                <label>Scheduler</label>
                                <select id="s-comfyui-scheduler"></select>
                            </div>
                        </div>

                        <div class="row-two">
                            <div>
                                <label>Width</label>
                                <input
                                    type="number"
                                    id="s-comfyui-width"
                                    min="64"
                                    max="4096"
                                    step="64"
                                />
                            </div>
                            <div>
                                <label>Height</label>
                                <input
                                    type="number"
                                    id="s-comfyui-height"
                                    min="64"
                                    max="4096"
                                    step="64"
                                />
                            </div>
                        </div>

                        <div class="row-two">
                            <div>
                                <label>Steps</label>
                                <input
                                    type="number"
                                    id="s-comfyui-steps"
                                    min="1"
                                    max="200"
                                />
                            </div>
                            <div>
                                <label>CFG</label>
                                <input
                                    type="number"
                                    id="s-comfyui-cfg"
                                    min="0"
                                    max="30"
                                    step="0.5"
                                />
                            </div>
                        </div>

                        <label>Negative prompt</label>
                        <textarea id="s-comfyui-negative" rows="2"></textarea>

                        <div class="row-two">
                            <div>
                                <label>Guidance <span class="muted-note">(Flux only)</span></label>
                                <input
                                    type="number"
                                    id="s-comfyui-guidance"
                                    min="0"
                                    max="20"
                                    step="0.5"
                                    value="3.5"
                                />
                            </div>
                            <div>
                                <label>Denoise <span class="muted-note">(img2img)</span></label>
                                <input
                                    type="number"
                                    id="s-comfyui-denoise"
                                    min="0.01"
                                    max="1.0"
                                    step="0.05"
                                    value="0.75"
                                />
                            </div>
                        </div>

                        <label>LoRA
                            <span class="muted-note">(optional — applied on top of checkpoint)</span>
                        </label>
                        <div style="display:flex;gap:8px;align-items:center">
                            <select id="s-comfyui-lora" style="flex:1">
                                <option value="">— none —</option>
                            </select>
                        </div>
                        <div class="row-two" id="s-lora-strength-wrap">
                            <div>
                                <label>LoRA model strength</label>
                                <input type="number" id="s-comfyui-lora-sm" min="0" max="2" step="0.05" value="0.8" />
                            </div>
                            <div>
                                <label>LoRA CLIP strength</label>
                                <input type="number" id="s-comfyui-lora-sc" min="0" max="2" step="0.05" value="0.8" />
                            </div>
                        </div>

                        <label class="checkbox-label">
                            <input type="checkbox" id="s-comfyui-commentary" />
                            LLM commentary after generation
                        </label>
                    </div>

                    <!-- Obsidian tab -->
                    <div class="settings-tab-panel" data-panel="obsidian">
                        <label
                            >Vault path
                            <button
                                id="s-obsidian-browse"
                                class="inline-btn"
                                title="Browse for vault folder"
                            >
                                📁
                            </button>
                        </label>
                        <input
                            type="text"
                            id="s-obsidian-vault-path"
                            placeholder="/home/you/Documents/Obsidian Vault"
                        />

                        <label>Daily note path (relative to vault)</label>
                        <input
                            type="text"
                            id="s-obsidian-daily-note-path"
                            placeholder="Daily Notes/{date}.md"
                        />
                        <span class="muted-note"
                            >Use <code>{date}</code> for YYYY-MM-DD.</span
                        >

                        <label>Section header</label>
                        <input
                            type="text"
                            id="s-obsidian-section-header"
                            placeholder="## About Logos"
                        />

                        <label>Digest format</label>
                        <select id="s-obsidian-digest-format">
                            <option value="titles">Titles only</option>
                            <option value="excerpts">
                                Titles + first message
                            </option>
                            <option value="summaries" disabled>
                                LLM summary per chat (v1.5.1)
                            </option>
                        </select>

                        <div class="obsidian-actions">
                            <button id="s-obsidian-sync" class="inline-btn">
                                Sync yesterday now
                            </button>
                            <button id="s-obsidian-preview" class="inline-btn">
                                Preview…
                            </button>
                        </div>
                        <div
                            id="s-obsidian-status"
                            class="muted-note"
                            style="margin-top: 8px"
                        ></div>
                    </div>

                    <!-- Memory tab -->
                    <div class="settings-tab-panel" data-panel="memory">
                        <label
                            >Memory
                            <button
                                id="s-memory-refresh"
                                class="inline-btn"
                                title="Refresh"
                            >
                                ↺
                            </button>
                        </label>
                        <div
                            id="s-memory-list"
                            class="memory-list full-height"
                        ></div>
                    </div>
                </div>
                <div class="settings-footer">
                    <span
                        id="s-version"
                        class="muted-note"
                        style="margin-right: auto"
                        >Logos v</span
                    >
                    <button
                        id="settings-quit"
                        title="Fully exit Logos (close window only minimises)"
                    >
                        Quit Logos
                    </button>
                    <button id="settings-save">Save</button>
                    <button id="settings-cancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div id="app">
            <header>
                <div id="header-left">
                    <span id="app-title">Λ logos</span>
                    <span id="model-badge">—</span>
                </div>
                <div id="header-right">
                    <button id="btn-new-chat" title="New Chat">⊕</button>
                    <button id="btn-settings" title="Settings">⚙</button>
                    <button id="btn-sidebar-toggle" title="Chat history">
                        ☰
                    </button>
                    <button id="btn-notes-toggle" title="Notes">▤</button>
                </div>
            </header>

            <!-- Sidebar (chat archive) -->
            <aside id="sidebar" class="closed">
                <div id="sidebar-header">
                    <span>History</span>
                    <button id="btn-sidebar-close" title="Close">✕</button>
                </div>
                <div id="chat-list"></div>
            </aside>

            <!-- Notes Sidebar (left) -->
            <aside id="notes-sidebar" class="closed">
                <div id="notes-sidebar-header">
                    <span>Notes</span>
                    <button id="btn-notes-close" title="Close">✕</button>
                </div>
                <input
                    id="notes-search"
                    type="search"
                    placeholder="Search notes…"
                    autocomplete="off"
                />
                <div id="notes-list"></div>
            </aside>

            <main id="chat-area">
                <div id="messages"></div>
                <div id="search-indicator" class="hidden">
                    <span class="search-spinner">⟳</span>
                    <span id="search-label">Searching…</span>
                </div>
            </main>

            <!-- Note Detail Overlay (modal) -->
            <div id="notes-detail-overlay" class="hidden">
                <div id="notes-detail-panel">
                    <div class="settings-header">
                        <span>Note details</span>
                        <button id="notes-detail-close">✕</button>
                    </div>
                    <div id="notes-detail-body"></div>
                    <div id="notes-detail-actions">
                        <button id="notes-detail-delete" class="danger">
                            🗑 Delete
                        </button>
                        <button
                            id="notes-detail-export"
                            disabled
                            title="Coming in v1.4.0 Phase E"
                        >
                            ⬇ Export ▾
                        </button>
                    </div>
                </div>
            </div>

            <footer>
                <div id="attachments-bar" class="hidden"></div>
                <div id="input-row">
                    <textarea
                        id="user-input"
                        placeholder="Message… (Enter to send, Shift+Enter for newline)"
                        rows="1"
                    ></textarea>
                    <div id="input-buttons">
                        <button id="btn-attach" title="Attach file">⇪</button>
                        <button id="btn-image" title="Generate image (ComfyUI)">
                            ✦
                        </button>
                        <button id="btn-search" title="Force web search">
                            ⌕
                        </button>
                        <button id="btn-send">Send</button>
                    </div>
                </div>
            </footer>
        </div>

        <script src="app.js"></script>
    </body>
</html>
